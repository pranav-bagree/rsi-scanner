name: 4h RSI scan (hourly)

# Runs the data pipeline (yfinance + RSI), publishes the dashboard to GitHub Pages.
# Analysis (why_it_fell, deep_dive) is intentionally not run here — it happens locally
# via Claude Code skills (/analyze-stock, /why-fell), since this account doesn't have
# an Anthropic API key available in CI.

on:
  # Auto-rebuild whenever main is updated so config/code changes land on the
  # live dashboard immediately rather than waiting for the next cron tick.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'PROJECT_HANDOFF.md'
      - '.gitignore'
      - 'output/**'
  schedule:
    # Twice per hour during US trading hours, weekdays. GitHub Actions
    # scheduled workflows are best-effort and get deprioritized at common
    # minute offsets (:00, :05, :15, :30). We fire at :13 and :43 (uncommon
    # offsets) for better reliability, and run twice an hour so a single
    # missed/delayed fire still leaves the dashboard < 30 min stale.
    # Hour window 13–22 UTC covers 09:13–17:43 ET in EDT and 08:13–16:43 ET
    # in EST — fully bracketing the 09:30–16:00 ET market session in either
    # season, plus the 13:30 ET and 16:00 ET 4h bar closes.
    - cron: '13,43 13-22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scan.py --skip-analysis --output public/index.html

      - name: Stamp build info
        run: |
          mkdir -p public
          {
            echo "Built: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_RUN_ID}"
          } > public/build.txt

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
