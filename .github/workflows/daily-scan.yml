name: 4h RSI scan (hourly)

# Runs the data pipeline (yfinance + RSI), publishes the dashboard to GitHub Pages.
# Analysis (why_it_fell, deep_dive) is intentionally not run here — it happens locally
# via Claude Code skills (/analyze-stock, /why-fell), since this account doesn't have
# an Anthropic API key available in CI.

on:
  schedule:
    # Hourly during US trading hours, weekdays. Cron is UTC; one entry covers
    # both EDT and EST since 14:05–21:05 UTC spans 10:05–17:05 EDT and
    # 09:05–16:05 EST — both fully bracket the 09:30–16:00 ET market session
    # plus a buffer past the 13:30 ET / 16:00 ET 4h bar closes.
    - cron: '5 14-21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scan.py --skip-analysis --output public/index.html

      - name: Stamp build info
        run: |
          mkdir -p public
          {
            echo "Built: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_RUN_ID}"
          } > public/build.txt

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
